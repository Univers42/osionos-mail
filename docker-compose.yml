services:
  mail:
    build:
      context: .
      target: dev
    image: ${MAIL_IMAGE:-track-binocle/mail:local}
    env_file:
      - path: ./.env.local
        required: false
      - path: ./.env
        required: false
    ports:
      - "${MAIL_HOST_PORT:-3002}:3002"
    environment:
      VITE_MAIL_BRIDGE_URL: ${VITE_MAIL_BRIDGE_URL:-http://localhost:4100}
    volumes:
      - .:/app
      - osionos_mail_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3002').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 20

  bridge:
    build:
      context: .
      target: dev
    image: ${MAIL_BRIDGE_IMAGE:-track-binocle/mail-bridge:local}
    command: npm run bridge
    env_file:
      - path: ./.env.local
        required: false
      - path: ./.env
        required: false
    ports:
      - "${MAIL_BRIDGE_PORT:-4100}:4100"
    environment:
      MAIL_BRIDGE_PORT: 4100
      MAIL_APP_ORIGIN: http://localhost:${MAIL_HOST_PORT:-3002}
      MAIL_BRIDGE_PUBLIC_ORIGIN: http://localhost:${MAIL_BRIDGE_PORT:-4100}
      GMAIL_REDIRECT_URI: http://localhost:${MAIL_BRIDGE_PORT:-4100}/auth/gmail/callback
      MAIL_BRIDGE_VAULT_ENABLED: ${MAIL_BRIDGE_VAULT_ENABLED:-false}
      VAULT_ADDR: ${VAULT_ADDR:-http://host.docker.internal:8200}
      MAIL_BRIDGE_VAULT_OAUTH_PATH: ${MAIL_BRIDGE_VAULT_OAUTH_PATH:-secret/data/mini-baas/oauth}
    volumes:
      - .:/app
      - osionos_mail_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const port=process.env.MAIL_BRIDGE_PORT||4100; fetch('http://127.0.0.1:'+port+'/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 12

volumes:
  osionos_mail_node_modules: