services:
  mail:
    build:
      context: .
      target: dev
    image: osionos-mail-dev:latest
    ports:
      - "${MAIL_HOST_PORT:-3002}:3002"
    environment:
      VITE_MAIL_BRIDGE_URL: ${VITE_MAIL_BRIDGE_URL:-http://localhost:${MAIL_BRIDGE_PORT:-4100}}
    volumes:
      - .:/app
      - osionos_mail_node_modules:/app/node_modules

  bridge:
    build:
      context: .
      target: dev
    image: osionos-mail-bridge-dev:latest
    command: npm run bridge
    ports:
      - "${MAIL_BRIDGE_PORT:-4100}:4100"
    environment:
      MAIL_BRIDGE_PORT: 4100
      MAIL_APP_ORIGIN: http://localhost:${MAIL_HOST_PORT:-3002}
      GMAIL_REDIRECT_URI: http://localhost:${MAIL_BRIDGE_PORT:-4100}/auth/gmail/callback
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GMAIL_SYNC_LIMIT: ${GMAIL_SYNC_LIMIT:-50}
    volumes:
      - .:/app
      - osionos_mail_node_modules:/app/node_modules

volumes:
  osionos_mail_node_modules: